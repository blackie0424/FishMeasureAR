name: FishMeasureAR
options:
  bundleIdPrefix: com.blackie
  deploymentTarget:
    iOS: "17.0"
packages:
  FishMeasureKit:
    path: FishMeasureKit
targets:
  FishMeasureAR:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: FishMeasureKit
    scheme:
      testTargets: []
    settings:
      base:
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: 1
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        DEVELOPMENT_TEAM: ""   # 填入你的 Apple Developer Team ID
    info:
      path: Sources/Info.plist
      properties:
        # 沒有 UILaunchScreen 宣告時,iOS 會把 App 視為 legacy 而上下 letterbox
        # (實機黑帶的根因);指定深色背景避免啟動閃白屏
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIRequiredDeviceCapabilities: [arkit]
        NSCameraUsageDescription: 需要相機進行 AR 魚長測量與拍攝。
        NSMicrophoneUsageDescription: 錄製魚種的聲音,附加於漁獲紀錄。
        NSLocationWhenInUseUsageDescription: 記錄漁獲的釣點位置。可在設定中啟用釣點隱私模式,或拒絕授權仍可使用測量功能。
        NSPhotoLibraryAddUsageDescription: 將測量完成的漁獲照片儲存到你的相簿。
        NSPhotoLibraryUsageDescription: 建立「FishMeasureAR」相簿集中儲存漁獲照片,並讀取縮圖顯示於日誌與統計。
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CADisableMinimumFrameDurationOnPhone: true
